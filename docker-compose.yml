services:
  postgres:
    image: postgres:16-alpine
    container_name: cp_postgres
    environment:
      POSTGRES_DB: community_platform
      POSTGRES_USER: cpuser
      POSTGRES_PASSWORD: ***REMOVED***
      POSTGRES_HOST_AUTH_METHOD: trust
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7.2-alpine
    container_name: cp_redis
    ports:
      - "6379:6379"

  rabbitmq:
    image: rabbitmq:3.13-management
    container_name: cp_rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: cpuser
      RABBITMQ_DEFAULT_PASS: ***REMOVED***
    ports:
      - "5672:5672"
      - "15672:15672"

  minio:
    image: minio/minio:latest
    container_name: cp_minio
    command: server /data --console-address ':9001'
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minio_2026
    ports:
      - "9000:9000"
      - "9001:9001"

volumes:
  postgres_data: